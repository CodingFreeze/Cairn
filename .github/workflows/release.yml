name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure git identity (tests create real repos)
        run: |
          git config --global user.email "ci@localhost"
          git config --global user.name "ci"
          git config --global init.defaultBranch main
      - name: Gate on full suite
        run: |
          python -m pip install --quiet pytest
          python -m pytest tests/ -q
      - name: Create GitHub release from CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Release notes = the CHANGELOG section for this tag (falls back to tag name).
          awk -v tag="${TAG#v}" '
            $0 ~ "^## " && found { exit }
            $0 ~ "^## " && index($0, tag) { found=1 }
            found { print }
          ' CHANGELOG.md > /tmp/notes.md
          [ -s /tmp/notes.md ] || echo "Release ${TAG}" > /tmp/notes.md
          gh release create "${TAG}" --title "${TAG}" --notes-file /tmp/notes.md
